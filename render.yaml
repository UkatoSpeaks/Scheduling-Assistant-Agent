services:
  - type: web
    name: scheduling-assistant-agent
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: MISTRAL_API_KEY
        sync: false

      - key: WEBHOOK_URL
        sync: false

      - key: DATABASE_URL
        value: appointments.db

      - key: CHECKPOINT_DB
        value: checkpoint.db
